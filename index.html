<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>こよちゃん配信一覧</title>
</head>
<body>
  <h1>博衣こより 配信アーカイブ</h1>

  <p>配信一覧（JSON取得）</p>

  <table border="1" id="list">
    <thead>
      <tr>
        <th>公開日</th>
        <th>タイトル</th>
        <th>再生リスト</th>
        <th>時間</th>
        <th>リンク</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
const url = "https://script.google.com/macros/s/AKfycbzLNPVR28em6L534Lk6FB9yKSJmAtkhJKqX6aFwREIgTtsKyCNPAcIZfeUoTsuUpKrkPA/exec";

// 日付フォーマット
function formatDate(dateStr) {
  const d = new Date(dateStr);

  const y = d.getFullYear();
  const m = d.getMonth() + 1;
  const day = d.getDate();
  const h = d.getHours();
  const min = d.getMinutes();

  return `${y}/${m}/${day} ${h}時${min.toString().padStart(2, '0')}分`;
}

// 再生時間フォーマット
function formatDuration(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;

  return `${h}時間${m}分${s}秒`;
}

fetch(url)
  .then(res => res.json())
  .then(data => {
    const tbody = document.querySelector("#list tbody");

    data.forEach(item => {
      const link = "https://www.youtube.com/watch?v=" + item.videoId;

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${formatDate(item.date)}</td>
        <td><a href="${link}" target</td>
        <td>${item.playlist}</td>
        <td>${formatDuration(item.seconds)}</td>
      `;

      tbody.appendChild(tr);
    });
  });
</script>

</body>
</html>
