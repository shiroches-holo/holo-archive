<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>こよちゃん配信一覧</title>

<style>
  table, th, td {
    border: 1px solid black;
    border-collapse: collapse;
  }

  .time-cell {
    text-align: right;
    white-space: nowrap;
  }

  .check-cell {
    text-align: center;
  }
</style>
</head>
<body>
  <h1>博衣こより 配信アーカイブ</h1>

  <div id="stats">
    <p>総動画：0本 / 0時間</p>
    <p>視聴済：0本 / 0時間</p>
    <p>視聴率：0%</p>
    
    <input type="text" id="search" placeholder="タイトル検索">
  
    <select id="filterStatus">
      <option value="all">すべて</option>
      <option value="watched">視聴済み</option>
      <option value="unwatched">未視聴</option>
    </select>
  
    <select id="sort">
      <option value="new">新しい順</option>
      <option value="old">古い順</option>
      <option value="long">再生時間（長い順）</option>
    </select>

  </div>
  
  <p>配信一覧</p>

  <table border="1" id="list">
    <thead>
      <tr>
        <th>公開日</th>
        <th>タイトル</th>
        <th>時間</th>
        <th>視聴済み</th>
        <th>再生リスト</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
const url = "https://script.google.com/macros/s/AKfycbzLNPVR28em6L534Lk6FB9yKSJmAtkhJKqX6aFwREIgTtsKyCNPAcIZfeUoTsuUpKrkPA/exec";

let totalCount, totalSeconds;
let watchedCount, watchedSeconds;

function formatDate(dateStr) {
  const d = new Date(dateStr);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
}

function formatDuration(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;

  let r = "";
  if (h) r += `${h}時間`;
  if (m) r += `${m}分`;
  if (s) r += `${s}秒`;
  return r || "0秒";
}

function formatTotal(sec){
  return `${Math.floor(sec/3600)}時間${Math.floor((sec%3600)/60)}分`;
}

// 👉 stats更新関数（超重要）
function updateStats(data){
  watchedCount = 0;
  watchedSeconds = 0;

  data.forEach(item=>{
    if(localStorage.getItem(item.videoId) === "true"){
      watchedCount++;
      watchedSeconds += item.seconds;
    }
  });

  const percent = totalCount
    ? ((watchedCount/totalCount)*100).toFixed(1)
    : 0;

  document.getElementById("stats").innerHTML = `
    <p>総動画：${totalCount}本 / ${formatTotal(totalSeconds)}</p>
    <p>視聴済：${watchedCount}本 / ${formatTotal(watchedSeconds)}</p>
    <p>視聴率：${percent}%</p>
  `;
}

fetch(url)
  .then(r=>r.json())
  .then(data=>{
    const tbody = document.querySelector("#list tbody");

    totalCount = data.length;
    totalSeconds = data.reduce((sum,x)=>sum+x.seconds,0);

    data.forEach(item=>{
      const tr = document.createElement("tr");

      const link = `https://www.youtube.com/watch?v=${item.videoId}`;

      tr.innerHTML = `
        <td>${formatDate(item.date)}</td>
        <td><a href="${link}" target="_blank">${item.title}</a></td>
        <td class="time-cell">${formatDuration(item.seconds)}</td>
        <td class="check-cell">
          <input type="checkbox">
        </td>
        <td>${item.playlist}</td>
      `;

      const cb = tr.querySelector("input");

      // 初期状態
      if(localStorage.getItem(item.videoId) === "true"){
        cb.checked = true;
      }

      // ✅ reloadやめてリアルタイム更新
      cb.addEventListener("change", ()=>{
        localStorage.setItem(item.videoId, cb.checked);
        updateStats(data);
      });

      tbody.appendChild(tr);
    });

    // 初回表示
    updateStats(data);
  });
</script>

</body>
</html>
